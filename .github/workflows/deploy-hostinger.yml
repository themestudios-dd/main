name: Deploy Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VITE_FACEBOOK_PAGE_URL: ${{ secrets.VITE_FACEBOOK_PAGE_URL }}
      VITE_META_PIXEL_ID: ${{ secrets.VITE_META_PIXEL_ID }}
      VITE_ENABLE_META_PIXEL: ${{ secrets.VITE_ENABLE_META_PIXEL }}
      MAILJET_API_KEY: ${{ secrets.MAILJET_API_KEY }}
      MAILJET_API_SECRET: ${{ secrets.MAILJET_API_SECRET }}
      MAILJET_FROM_EMAIL: ${{ secrets.MAILJET_FROM_EMAIL }}
      MAILJET_FROM_NAME: ${{ secrets.MAILJET_FROM_NAME }}
      CONTACT_TO_EMAIL: ${{ secrets.CONTACT_TO_EMAIL }}
      CONTACT_TO_NAME: ${{ secrets.CONTACT_TO_NAME }}
      HOSTINGER_FTP_SERVER: ${{ secrets.HOSTINGER_FTP_SERVER }}
      HOSTINGER_FTP_USERNAME: ${{ secrets.HOSTINGER_FTP_USERNAME }}
      HOSTINGER_FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate deployment secrets
        run: |
          missing=()
          for key in HOSTINGER_FTP_SERVER HOSTINGER_FTP_USERNAME HOSTINGER_FTP_PASSWORD MAILJET_API_KEY MAILJET_API_SECRET; do
            if [ -z "${!key}" ]; then
              missing+=("$key")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required GitHub secrets: ${missing[*]}" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build production site
        run: npm run build

      - name: Deploy dist to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: /public_html/
