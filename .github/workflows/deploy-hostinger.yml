name: Publish Hostinger Deploy Branch

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish-deploy-branch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VITE_FACEBOOK_PAGE_URL: ${{ secrets.VITE_FACEBOOK_PAGE_URL }}
      VITE_META_PIXEL_ID: ${{ secrets.VITE_META_PIXEL_ID }}
      VITE_ENABLE_META_PIXEL: ${{ secrets.VITE_ENABLE_META_PIXEL }}
      MAILJET_API_KEY: ${{ secrets.MAILJET_API_KEY }}
      MAILJET_API_SECRET: ${{ secrets.MAILJET_API_SECRET }}
      MAILJET_FROM_EMAIL: ${{ secrets.MAILJET_FROM_EMAIL }}
      MAILJET_FROM_NAME: ${{ secrets.MAILJET_FROM_NAME }}
      CONTACT_TO_EMAIL: ${{ secrets.CONTACT_TO_EMAIL }}
      CONTACT_TO_NAME: ${{ secrets.CONTACT_TO_NAME }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production site
        run: npm run build

      - name: Remove packaged server secrets from deploy branch
        run: rm -f dist/.env

      - name: Publish dist to deploy branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf /tmp/hostinger-deploy
          mkdir -p /tmp/hostinger-deploy
          cp -R dist/. /tmp/hostinger-deploy/

          cd /tmp/hostinger-deploy
          git init -b deploy
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy from ${GITHUB_SHA}"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin deploy
