<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Monthly Growth Pack branding card</title>
  <desc id="desc">A modern blue branding card for the Monthly Growth Pack with bold typography, gradient panels and abstract growth graphics.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a2f77"/>
      <stop offset="58%" stop-color="#0e67d2"/>
      <stop offset="100%" stop-color="#17b7e8"/>
    </linearGradient>
    <radialGradient id="glow" cx="18%" cy="18%" r="72%">
      <stop offset="0%" stop-color="#89eeff" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#89eeff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08214f"/>
      <stop offset="100%" stop-color="#0d3f8b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d8fbff"/>
      <stop offset="100%" stop-color="#56d8ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#071834" flood-opacity="0.32"/>
    </filter>
    <style>
      .eyebrow { font: 700 24px 'Segoe UI', Arial, sans-serif; letter-spacing: 3px; text-transform: uppercase; }
      .display { font-family: 'Segoe UI', Arial, sans-serif; font-weight: 900; letter-spacing: -2px; }
      .body { font: 700 28px 'Segoe UI', Arial, sans-serif; }
      .chip { font: 700 24px 'Segoe UI', Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1600" height="1000" rx="56" fill="url(#bg)"/>
  <rect width="1600" height="1000" rx="56" fill="url(#glow)"/>
  <circle cx="190" cy="840" r="180" fill="#6fe7ff" opacity="0.11"/>
  <circle cx="1350" cy="170" r="180" fill="#ffffff" opacity="0.08"/>
  <path d="M0 860c220-80 440-80 660 0s440 80 940-24V1000H0z" fill="rgba(255,255,255,0.08)"/>

  <text x="88" y="96" class="eyebrow" fill="#dff6ff">ThemeStudios package series</text>
  <text x="88" y="220" class="display" font-size="128" fill="#ffffff">MONTHLY</text>
  <text x="88" y="346" class="display" font-size="142" fill="#97f3ff">GROWTH</text>
  <text x="88" y="468" class="display" font-size="126" fill="#ffffff">PACK</text>
  <text x="90" y="560" class="body" fill="#ddf7ff">Ongoing design support built for active calendars, campaign bursts and repeat visibility.</text>

  <g filter="url(#shadow)">
    <rect x="1040" y="108" width="454" height="784" rx="46" fill="url(#panel)" stroke="rgba(255,255,255,0.18)" stroke-width="3"/>
    <rect x="1092" y="166" width="158" height="112" rx="28" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.1)"/>
    <text x="1128" y="214" class="eyebrow" fill="#9feeff" style="font-size:18px">Campaign rhythm</text>
    <text x="1128" y="252" class="display" font-size="52" fill="#ffffff">30 DAY</text>

    <circle cx="1296" cy="420" r="108" fill="none" stroke="rgba(159,238,255,0.38)" stroke-width="18"/>
    <circle cx="1296" cy="420" r="68" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="8"/>
    <path d="M1234 458l36-42 40 28 56-82" fill="none" stroke="url(#accent)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="1152" y="560" width="288" height="128" rx="28" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.1)"/>
    <rect x="1184" y="604" width="44" height="38" rx="16" fill="#4ed8ff"/>
    <rect x="1242" y="576" width="44" height="66" rx="16" fill="#79e9ff"/>
    <rect x="1300" y="548" width="44" height="94" rx="16" fill="#bdf7ff"/>
    <rect x="1358" y="516" width="44" height="126" rx="16" fill="#ffffff"/>
    <text x="1182" y="722" class="body" fill="#dff8ff" style="font-size:24px">Growth-oriented content system</text>
  </g>

  <g>
    <rect x="88" y="728" width="212" height="86" rx="26" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.16)"/>
    <text x="132" y="782" class="chip" fill="#ffffff">12 posters</text>
    <rect x="320" y="728" width="224" height="86" rx="26" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.16)"/>
    <text x="362" y="782" class="chip" fill="#ffffff">4 festive</text>
    <rect x="566" y="728" width="208" height="86" rx="26" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.16)"/>
    <text x="610" y="782" class="chip" fill="#ffffff">4 stories</text>
  </g>
</svg>
