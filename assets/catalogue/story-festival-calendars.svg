<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1250 1000" role="img" aria-labelledby="title desc">
  <title id="title">Festival calendar story artwork</title>
  <desc id="desc">A festive horizontal campaign visual showing seasonal dates and celebration-style tiles for planned greeting and promotional design.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5c1018"/>
      <stop offset="46%" stop-color="#a92d1f"/>
      <stop offset="100%" stop-color="#f29923"/>
    </linearGradient>
    <radialGradient id="glow" cx="28%" cy="16%" r="70%">
      <stop offset="0%" stop-color="#ffe79a" stop-opacity="0.46"/>
      <stop offset="100%" stop-color="#ffe79a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff1bf"/>
      <stop offset="100%" stop-color="#ffcf67"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#521018" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1250" height="1000" fill="url(#bg)"/>
  <rect width="1250" height="1000" fill="url(#glow)"/>
  <circle cx="1050" cy="182" r="186" fill="#fff1bf" opacity="0.14"/>
  <circle cx="160" cy="860" r="150" fill="#ffd773" opacity="0.12"/>

  <text x="82" y="90" fill="#fff8eb" font-family="Arial, sans-serif" font-size="26" font-weight="700" letter-spacing="2">THEMESTUDIOS</text>
  <text x="82" y="122" fill="#ffd8a2" font-family="Arial, sans-serif" font-size="18" font-weight="600" letter-spacing="1.6">Festival calendar concept</text>

  <text x="82" y="250" fill="#ffffff" font-family="Arial, sans-serif" font-size="116" font-weight="900">FESTIVAL</text>
  <text x="82" y="370" fill="url(#gold)" font-family="Arial, sans-serif" font-size="142" font-weight="900">CALENDAR</text>
  <text x="82" y="466" fill="#fff7ea" font-family="Arial, sans-serif" font-size="36" font-weight="700">Plan greetings and offer posts before the season arrives.</text>

  <g fill="#fff9ef" font-family="Arial, sans-serif">
    <circle cx="100" cy="628" r="12" fill="#ffd56d"/>
    <text x="128" y="637" font-size="28" font-weight="700">Keeps the brand visible across every important date</text>
    <circle cx="100" cy="682" r="12" fill="#ffd56d"/>
    <text x="128" y="691" font-size="28" font-weight="700">Removes the last-minute festival rush</text>
    <circle cx="100" cy="736" r="12" fill="#ffd56d"/>
    <text x="128" y="745" font-size="28" font-weight="700">Useful for wishes, banners and festive offers</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="708" y="92" width="460" height="816" rx="38" fill="#751e1c" stroke="#ffd56d" stroke-width="3"/>

    <rect x="748" y="136" width="168" height="152" rx="28" fill="#c94a26"/>
    <text x="782" y="188" fill="#fff8eb" font-family="Arial, sans-serif" font-size="24" font-weight="800">PONGAL</text>
    <path d="M820 250c20-44 42-64 60-64 18 0 40 20 60 64-18-8-40-12-60-12-20 0-42 4-60 12z" fill="#fff1bf"/>
    <ellipse cx="880" cy="252" rx="44" ry="16" fill="#8e361f"/>

    <rect x="948" y="136" width="168" height="152" rx="28" fill="#8c2330"/>
    <text x="992" y="188" fill="#fff8eb" font-family="Arial, sans-serif" font-size="24" font-weight="800">DIWALI</text>
    <path d="M1028 246h72" stroke="#ffd56d" stroke-width="5"/>
    <path d="M1044 216v56M1084 216v56" stroke="#ffd56d" stroke-width="3"/>
    <path d="M1054 272c0 18 12 30 26 30 14 0 26-12 26-30" stroke="#ffd56d" stroke-width="3" fill="none"/>

    <rect x="748" y="320" width="168" height="152" rx="28" fill="#f1dfc5"/>
    <text x="780" y="370" fill="#6a3f1d" font-family="Arial, sans-serif" font-size="24" font-weight="800">NEW YEAR</text>
    <circle cx="830" cy="426" r="36" fill="#ffcf67"/>
    <path d="M830 378v96M782 426h96" stroke="#ffffff" stroke-width="5"/>

    <rect x="948" y="320" width="168" height="152" rx="28" fill="#b13120"/>
    <text x="982" y="370" fill="#fff8eb" font-family="Arial, sans-serif" font-size="24" font-weight="800">SPECIAL DAY</text>
    <path d="M1026 446c12-22 28-34 52-34 24 0 40 12 52 34" stroke="#ffd56d" stroke-width="5" fill="none"/>
    <circle cx="1052" cy="434" r="10" fill="#ffd56d"/>

    <rect x="748" y="522" width="368" height="168" rx="30" fill="#6b1918" stroke="#efb44c" stroke-width="2"/>
    <text x="782" y="582" fill="#fff8eb" font-family="Arial, sans-serif" font-size="48" font-weight="900">WISHES + OFFER + CONTACT</text>
    <text x="784" y="638" fill="#ffd8a2" font-family="Arial, sans-serif" font-size="28" font-weight="700">One planned creative system for celebration days and seasonal campaigns</text>

    <rect x="748" y="724" width="368" height="142" rx="28" fill="#7f221c"/>
    <text x="782" y="782" fill="#ffffff" font-family="Arial, sans-serif" font-size="34" font-weight="800">Plan before the rush</text>
    <text x="782" y="832" fill="#ffe8b9" font-family="Arial, sans-serif" font-size="24" font-weight="700">Theme, greeting line, offer and brand details stay ready in advance</text>
  </g>
</svg>
