<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1250 1000" role="img" aria-labelledby="title desc">
  <title id="title">Monthly systems story artwork</title>
  <desc id="desc">A horizontal monthly support visual showing a structured 30-day content system with multiple campaign tiles and a recurring package panel.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08152d"/>
      <stop offset="48%" stop-color="#0b408f"/>
      <stop offset="100%" stop-color="#10a0d7"/>
    </linearGradient>
    <radialGradient id="glow" cx="26%" cy="18%" r="70%">
      <stop offset="0%" stop-color="#66e1ff" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#66e1ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bdf4ff"/>
      <stop offset="100%" stop-color="#36cfff"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff0a8"/>
      <stop offset="100%" stop-color="#ffaf35"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#071225" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1250" height="1000" fill="url(#bg)"/>
  <rect width="1250" height="1000" fill="url(#glow)"/>
  <circle cx="1058" cy="176" r="180" fill="#fff0a8" opacity="0.08"/>
  <circle cx="150" cy="840" r="146" fill="#6ce7ff" opacity="0.12"/>

  <text x="82" y="90" fill="#def2ff" font-family="Arial, sans-serif" font-size="26" font-weight="700" letter-spacing="2">THEMESTUDIOS</text>
  <text x="82" y="122" fill="#9ccaf4" font-family="Arial, sans-serif" font-size="18" font-weight="600" letter-spacing="1.6">Monthly system concept</text>

  <text x="82" y="248" fill="#ffffff" font-family="Arial, sans-serif" font-size="108" font-weight="900">30 DAY</text>
  <text x="82" y="360" fill="url(#cyan)" font-family="Arial, sans-serif" font-size="136" font-weight="900">CONTENT</text>
  <text x="82" y="460" fill="#ffffff" font-family="Arial, sans-serif" font-size="92" font-weight="900">FLOW</text>
  <text x="82" y="540" fill="#e9f7ff" font-family="Arial, sans-serif" font-size="34" font-weight="700">Recurring design support creates a rhythm instead of one-off design scrambling.</text>

  <g fill="#edf8ff" font-family="Arial, sans-serif">
    <circle cx="100" cy="700" r="12" fill="#66e1ff"/>
    <text x="128" y="709" font-size="28" font-weight="700">Multiple campaigns can be planned together</text>
    <circle cx="100" cy="754" r="12" fill="#66e1ff"/>
    <text x="128" y="763" font-size="28" font-weight="700">Offer posts, festival posts and stories stay aligned</text>
    <circle cx="100" cy="808" r="12" fill="#66e1ff"/>
    <text x="128" y="817" font-size="28" font-weight="700">Better consistency than ordering one poster at a time</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="700" y="92" width="468" height="816" rx="38" fill="#0b1b35" stroke="#64dcff" stroke-width="3"/>

    <rect x="740" y="136" width="184" height="170" rx="28" fill="#0d4ab0"/>
    <text x="770" y="188" fill="#dff6ff" font-family="Arial, sans-serif" font-size="22" font-weight="800">LIMITED TIME</text>
    <text x="770" y="252" fill="#fff0a8" font-family="Arial, sans-serif" font-size="54" font-weight="900">MEGA</text>
    <text x="770" y="308" fill="#fff0a8" font-family="Arial, sans-serif" font-size="64" font-weight="900">SALE</text>

    <rect x="944" y="136" width="184" height="170" rx="28" fill="#121113"/>
    <text x="972" y="188" fill="#ffffff" font-family="Arial, sans-serif" font-size="22" font-weight="800">HOT &amp; FRESH</text>
    <text x="972" y="244" fill="#ffa238" font-family="Arial, sans-serif" font-size="56" font-weight="900">PIZZA</text>
    <circle cx="1038" cy="260" r="50" fill="#e9a44a"/>
    <circle cx="1038" cy="260" r="38" fill="#f6d082"/>
    <circle cx="1018" cy="248" r="6" fill="#d33e36"/>
    <circle cx="1056" cy="270" r="6" fill="#2a8b48"/>

    <rect x="740" y="334" width="184" height="170" rx="28" fill="#f3e8d7"/>
    <text x="770" y="388" fill="#6a3f1d" font-family="Arial, sans-serif" font-size="22" font-weight="800">NEW ARRIVAL</text>
    <path d="M832 418c24 0 42 18 42 42v34h-84v-34c0-24 18-42 42-42z" fill="#c49b66"/>
    <rect x="810" y="374" width="44" height="56" rx="22" fill="#f0c37e"/>

    <rect x="944" y="334" width="184" height="170" rx="28" fill="#0c376b"/>
    <text x="974" y="388" fill="#ffffff" font-family="Arial, sans-serif" font-size="22" font-weight="800">ADMISSION</text>
    <text x="974" y="442" fill="#ffd56d" font-family="Arial, sans-serif" font-size="54" font-weight="900">OPEN</text>
    <circle cx="1048" cy="450" r="34" fill="#e9f0ff"/>
    <path d="M1018 438l30-18 30 18-30 16-30-16z" fill="#ffd56d"/>

    <rect x="740" y="542" width="388" height="154" rx="30" fill="#0c2447" stroke="#1f4f86" stroke-width="2"/>
    <text x="774" y="596" fill="#9edfff" font-family="Arial, sans-serif" font-size="20" font-weight="700">MONTHLY GROWTH PACK</text>
    <text x="774" y="652" fill="#ffffff" font-family="Arial, sans-serif" font-size="56" font-weight="900">Rs 1,499 / month</text>
    <text x="776" y="708" fill="#dff5ff" font-family="Arial, sans-serif" font-size="26" font-weight="700">12 posters + festival creatives + stories in one recurring system</text>

    <rect x="740" y="726" width="388" height="142" rx="28" fill="#0b1730"/>
    <g fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="700">
      <circle cx="766" cy="774" r="8" fill="#66e1ff"/>
      <text x="790" y="782">Content stays active all month</text>
      <circle cx="766" cy="822" r="8" fill="#66e1ff"/>
      <text x="790" y="830">Campaigns feel related, not random</text>
    </g>
  </g>
</svg>
