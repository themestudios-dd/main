<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Premium Branding Poster branding card</title>
  <desc id="desc">A modern plum and gold branding card for the Premium Branding Poster with refined typography, spotlight motifs and luxury geometry.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2b113e"/>
      <stop offset="58%" stop-color="#52246d"/>
      <stop offset="100%" stop-color="#9b4bb0"/>
    </linearGradient>
    <radialGradient id="glow" cx="18%" cy="16%" r="70%">
      <stop offset="0%" stop-color="#f0d4ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f0d4ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f0d2c"/>
      <stop offset="100%" stop-color="#321445"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff0c3"/>
      <stop offset="100%" stop-color="#dca34f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#14081d" flood-opacity="0.32"/>
    </filter>
    <style>
      .eyebrow { font: 700 24px 'Segoe UI', Arial, sans-serif; letter-spacing: 3px; text-transform: uppercase; }
      .display { font-family: 'Segoe UI', Arial, sans-serif; font-weight: 900; letter-spacing: -2px; }
      .body { font: 700 28px 'Segoe UI', Arial, sans-serif; }
      .chip { font: 700 24px 'Segoe UI', Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1600" height="1000" rx="56" fill="url(#bg)"/>
  <rect width="1600" height="1000" rx="56" fill="url(#glow)"/>
  <circle cx="1316" cy="176" r="180" fill="#ffffff" opacity="0.06"/>
  <circle cx="168" cy="852" r="170" fill="#f0d4ff" opacity="0.1"/>
  <path d="M0 862c234-88 468-88 704 0s438 88 896-22V1000H0z" fill="rgba(255,255,255,0.08)"/>

  <text x="88" y="96" class="eyebrow" fill="#f6e8ff">ThemeStudios package series</text>
  <text x="88" y="220" class="display" font-size="118" fill="#ffffff">PREMIUM</text>
  <text x="88" y="340" class="display" font-size="140" fill="url(#gold)">BRAND</text>
  <text x="88" y="462" class="display" font-size="126" fill="#ffffff">POSTER</text>
  <text x="90" y="560" class="body" fill="#f7ebff">A refined visual lane for launches, luxury offers and campaigns that need stronger polish.</text>

  <g filter="url(#shadow)">
    <rect x="1040" y="108" width="454" height="784" rx="46" fill="url(#panel)" stroke="rgba(255,255,255,0.16)" stroke-width="3"/>
    <circle cx="1268" cy="340" r="128" fill="none" stroke="rgba(255,255,255,0.11)" stroke-width="8"/>
    <circle cx="1268" cy="340" r="90" fill="none" stroke="rgba(220,163,79,0.5)" stroke-width="16"/>
    <path d="M1268 246l72 94-72 94-72-94z" fill="rgba(255,255,255,0.06)" stroke="url(#gold)" stroke-width="10"/>
    <path d="M1218 340h100" stroke="url(#gold)" stroke-width="10" stroke-linecap="round"/>
    <path d="M1268 288v104" stroke="url(#gold)" stroke-width="10" stroke-linecap="round"/>
    <rect x="1136" y="548" width="264" height="154" rx="30" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)"/>
    <text x="1174" y="602" class="eyebrow" fill="#f0d4ff" style="font-size:18px">Signature polish</text>
    <text x="1174" y="654" class="display" font-size="52" fill="#ffffff">LUXE</text>
    <text x="1174" y="696" class="body" fill="#f9ecd8" style="font-size:24px">Sharper hierarchy and richer visual finish</text>
  </g>

  <g>
    <rect x="88" y="728" width="228" height="86" rx="26" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.16)"/>
    <text x="132" y="782" class="chip" fill="#ffffff">High polish</text>
    <rect x="340" y="728" width="272" height="86" rx="26" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.16)"/>
    <text x="382" y="782" class="chip" fill="#ffffff">Premium hierarchy</text>
    <rect x="636" y="728" width="222" height="86" rx="26" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.16)"/>
    <text x="680" y="782" class="chip" fill="#ffffff">Launch-ready</text>
  </g>
</svg>
